<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Concept A: Saved Style Templates in the native application menu</title>
  <desc id="desc">A 1280 by 720 Okay Karaoke Studio window with a top-level Style application menu open. The menu offers Edit Project Style, a Load Template into Style submenu with recent templates, Save Current Style as Template, and Manage Style Templates. Choosing a template opens the existing Style draft rather than immediately changing the project.</desc>
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#352446"/>
      <stop offset="1" stop-color="#191321"/>
    </linearGradient>
    <filter id="menuShadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#2d2038" flood-opacity=".22"/>
    </filter>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#302b38}
      .heading{font-size:16px;font-weight:800}.label{font-size:11px;font-weight:700}
      .small{font-size:9px;fill:#62576e}.tiny{font-size:7px;fill:#72677c;font-weight:700;letter-spacing:.08em}
      .panel{fill:#fff;stroke:#d9cce9}.soft{fill:#f3edf9;stroke:#d9cce9}.field{fill:#fff;stroke:#a88fba}
      .button{fill:#ff8a2b;stroke:#e66f12}.buttonText{fill:#3c200e;font-size:9px;font-weight:800}
      .menuText{font-size:12px}.menuHint{font-size:11px;fill:#7a7081}.menuDisabled{font-size:12px;fill:#aaa2af}
      .stageText{fill:#e7e1ec;font-size:20px;font-weight:800}.stageSmall{fill:#bfb7c7;font-size:7px;font-weight:700}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#f8f6fb"/>

  <!-- Generic cross-platform application menu row -->
  <rect width="1280" height="28" fill="#f0edf3"/>
  <line x1="0" y1="28" x2="1280" y2="28" stroke="#d8d1dd"/>
  <text x="14" y="19" class="label">Okay Karaoke Studio</text>
  <text x="151" y="19" class="menuText">File</text>
  <text x="190" y="19" class="menuText">Edit</text>
  <rect x="224" y="3" width="48" height="22" rx="5" fill="#ded4e9"/>
  <text x="248" y="19" text-anchor="middle" class="label" fill="#70469e">Style</text>
  <text x="286" y="19" class="menuText">Playback</text>
  <text x="358" y="19" class="menuText">View</text>
  <text x="400" y="19" class="menuText">Window</text>

  <!-- Existing application header -->
  <rect y="28" width="1280" height="58" fill="#fff"/>
  <line x1="0" y1="86" x2="1280" y2="86" stroke="#ebe4f2"/>
  <rect x="16" y="42" width="30" height="30" rx="9" fill="#aa8dde" stroke="#d8c9e9"/>
  <path d="M25 49h13v16H25z" fill="#fbf9fd" transform="rotate(-5 31 57)"/>
  <text x="56" y="53" class="label">Okay</text>
  <text x="56" y="67" class="tiny">KARAOKE STUDIO</text>
  <rect x="142" y="42" width="92" height="30" rx="9" fill="#f1eafa" stroke="#9b78cf"/>
  <text x="188" y="61" text-anchor="middle" class="label" fill="#70469e">Style</text>
  <text x="512" y="61" class="small">Midnight Rehearsal · Editing</text>
  <g>
    <rect x="950" y="42" width="34" height="30" rx="8" class="soft"/><text x="967" y="61" text-anchor="middle" class="small">＋</text>
    <rect x="990" y="42" width="34" height="30" rx="8" class="soft"/><text x="1007" y="61" text-anchor="middle" class="small">⌘O</text>
    <rect x="1030" y="42" width="34" height="30" rx="8" class="soft"/><text x="1047" y="61" text-anchor="middle" class="small">⌘S</text>
    <rect x="1078" y="42" width="82" height="30" rx="8" class="soft"/><text x="1119" y="61" text-anchor="middle" class="small">Workflow</text>
    <rect x="1168" y="42" width="96" height="30" rx="9" class="button"/><text x="1216" y="61" text-anchor="middle" class="buttonText">Export</text>
  </g>

  <!-- Normal workspace behind the menu -->
  <rect y="86" width="270" height="564" fill="#fcfbfd"/>
  <line x1="270" y1="86" x2="270" y2="650" stroke="#ebe4f2"/>
  <text x="16" y="113" class="tiny">SONG DETAILS</text>
  <text x="16" y="137" class="small">Title</text>
  <rect x="16" y="145" width="238" height="31" rx="8" class="field"/>
  <text x="27" y="165" class="small">Midnight Rehearsal</text>
  <text x="16" y="198" class="small">Artist</text>
  <rect x="16" y="206" width="238" height="31" rx="8" class="field"/>
  <text x="27" y="226" class="small">The Late Set</text>
  <line x1="16" y1="260" x2="254" y2="260" stroke="#ebe4f2"/>
  <text x="16" y="286" class="tiny">BACKING TRACK</text>
  <rect x="16" y="296" width="238" height="58" rx="9" class="soft"/>
  <text x="29" y="321" class="label">midnight-rehearsal.wav</text>
  <text x="29" y="339" class="tiny">LINKED · 03:42</text>
  <text x="16" y="388" class="tiny">VOCAL TRACK</text>
  <rect x="16" y="398" width="238" height="92" rx="12" fill="#f3edf9" stroke="#9b78cf"/>
  <circle cx="44" cy="426" r="17" fill="#ff8a2b"/>
  <text x="73" y="424" class="label">Lead Vocal</text>
  <text x="73" y="441" class="tiny">186 / 220 TIMED</text>
  <rect x="73" y="452" width="168" height="28" rx="8" class="field"/>
  <circle cx="89" cy="466" r="8" fill="#ff8a2b"/>
  <text x="106" y="470" class="small">Sung</text>

  <rect x="270" y="86" width="1010" height="564" fill="#f8f6fb"/>
  <rect x="288" y="103" width="974" height="330" rx="14" class="panel"/>
  <text x="308" y="129" class="tiny">STAGE MONITOR</text>
  <text x="308" y="153" class="heading">Live Preview</text>
  <rect x="449" y="125" width="676" height="285" rx="10" fill="url(#stage)"/>
  <rect x="488" y="151" width="598" height="233" rx="3" fill="none" stroke="#4a3d58" stroke-width="2"/>
  <text x="505" y="171" class="stageSmall">OKAY / STUDIO</text>
  <text x="1068" y="171" text-anchor="end" class="stageSmall">01:12.400</text>
  <text x="787" y="277" text-anchor="middle" class="stageText" fill="#ff8a2b">Hold on to the night</text>
  <text x="505" y="365" class="stageSmall">THE LATE SET · MIDNIGHT REHEARSAL</text>

  <rect x="288" y="449" width="974" height="184" rx="14" class="panel"/>
  <text x="308" y="476" class="tiny">LYRIC TIMING</text>
  <line x1="316" y1="512" x2="1237" y2="512" stroke="#cfc3da"/>
  <g fill="#d9cce9" stroke="#9b78cf">
    <rect x="332" y="529" width="96" height="31" rx="7"/><rect x="436" y="529" width="72" height="31" rx="7"/>
    <rect x="516" y="529" width="114" height="31" rx="7"/><rect x="638" y="529" width="58" height="31" rx="7"/>
    <rect x="704" y="529" width="92" height="31" rx="7"/><rect x="804" y="529" width="128" height="31" rx="7"/>
  </g>
  <line x1="738" y1="492" x2="738" y2="607" stroke="#ff8a2b" stroke-width="2"/>

  <rect y="650" width="1280" height="70" fill="#fff"/>
  <line x1="0" y1="650" x2="1280" y2="650" stroke="#ebe4f2"/>
  <rect x="16" y="659" width="220" height="52" rx="11" class="soft"/>
  <text x="34" y="683" class="label">Start sync</text>
  <text x="34" y="700" class="tiny">LEAD VOCAL</text>
  <circle cx="566" cy="685" r="22" fill="#ff8a2b"/>
  <path d="M560 676l16 9-16 9z" fill="#3c200e"/>
  <text x="618" y="689" class="label">1:12.400 / 3:42.000</text>

  <!-- Explanatory annotation -->
  <g>
    <rect x="824" y="458" width="414" height="151" rx="13" fill="#fff8f1" stroke="#efc6a6"/>
    <text x="844" y="486" class="tiny" fill="#9b4e16">CONCEPT A · NATIVE APPLICATION MENU</text>
    <text x="844" y="511" class="label">Fast desktop access without a permanent new control</text>
    <text x="844" y="533" class="small">A name opens Style with the template loaded into its draft.</text>
    <text x="844" y="551" class="small">The project stays unchanged until Apply &amp; close.</text>
    <text x="844" y="577" class="small">Warnings and rename/delete still need a management view.</text>
  </g>

  <!-- Open native Style menu -->
  <g filter="url(#menuShadow)">
    <rect x="224" y="28" width="302" height="260" rx="8" fill="#fff" stroke="#cfc5d6"/>
    <rect x="231" y="36" width="288" height="34" rx="6" fill="#f2ecf8"/>
    <text x="247" y="58" class="menuText" font-weight="700">Edit Project Style…</text>
    <text x="505" y="58" text-anchor="end" class="menuHint">⌘⇧T</text>
    <line x1="236" y1="78" x2="514" y2="78" stroke="#ece6f0"/>
    <rect x="231" y="86" width="288" height="34" rx="6" fill="#e9def5"/>
    <text x="247" y="108" class="menuText" font-weight="700">Load Template into Style</text>
    <path d="M502 97l7 6-7 6" fill="none" stroke="#6f6279" stroke-width="1.5"/>
    <text x="247" y="146" class="menuText">Save Current Style as Template…</text>
    <text x="505" y="146" text-anchor="end" class="menuHint">⌘⌥S</text>
    <text x="247" y="181" class="menuText">Manage Style Templates…</text>
    <line x1="236" y1="197" x2="514" y2="197" stroke="#ece6f0"/>
    <text x="247" y="222" class="menuDisabled">Apply &amp; close Style</text>
    <text x="247" y="256" class="menuDisabled">Cancel Style draft</text>
  </g>

  <!-- Recent-template submenu -->
  <g filter="url(#menuShadow)">
    <rect x="524" y="84" width="282" height="180" rx="8" fill="#fff" stroke="#cfc5d6"/>
    <text x="542" y="108" class="tiny">RECENT TEMPLATES</text>
    <rect x="531" y="118" width="268" height="34" rx="6" fill="#f2ecf8"/>
    <circle cx="550" cy="135" r="7" fill="#5b3b72"/><text x="566" y="139" class="menuText" font-weight="700">Stage Show Dark</text>
    <circle cx="550" cy="169" r="7" fill="#d88243"/><text x="566" y="173" class="menuText">Warm Pub</text>
    <circle cx="550" cy="203" r="7" fill="#f8f6fb" stroke="#5d5365"/><text x="566" y="207" class="menuText">High-Contrast Practice</text>
    <line x1="536" y1="220" x2="794" y2="220" stroke="#ece6f0"/>
    <text x="542" y="247" class="menuText">Open template library…</text>
  </g>

</svg>
