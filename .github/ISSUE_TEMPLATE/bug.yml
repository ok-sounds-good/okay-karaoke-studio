name: Bug report
description: Report a reproducible problem in Okay Karaoke Studio.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Agent-authored submissions must follow the role and relay contract in
        docs/SDLC.md. Because this generated form cannot place that role marker
        first, agents construct a compliant role-marked Issue body instead of
        submitting the form output unchanged.

        Do not attach copyrighted songs, lyrics, or media. Use a synthetic or redacted project when possible.
  - type: input
    id: version
    attributes:
      label: App version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Renderer-only browser mode
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest reliable sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or safe reproduction material
      description: Paste relevant logs or attach a synthetic/redacted .oks project. Remove personal paths and media.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched for an existing issue describing this problem.
          required: true
        - label: I removed copyrighted media, lyrics, and sensitive local paths.
          required: true
