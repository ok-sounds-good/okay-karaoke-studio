version: 2.1

jobs:
  macOS:
    macos:
      xcode: '16.4.0'
    resource_class: m4pro.medium
    environment:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      FORMAT_DEFAULT_BRANCH: main
    steps:
      - checkout

      - run:
          name: Configure Node.js 24 and Bun 1.3.14
          command: |
            source "$HOME/.nvm/nvm.sh"
            nvm use 24.0.2
            npm install --global bun@1.3.14
            {
              echo 'source "$HOME/.nvm/nvm.sh"'
              echo 'nvm use 24.0.2 >/dev/null'
            } >> "$BASH_ENV"
            test "$(node --version)" = "v24.0.2"
            test "$(bun --version)" = "1.3.14"

      - run:
          name: Install locked dependencies
          command: bun install --frozen-lockfile

      - run:
          name: Check formatting in changed lines
          command: |
            git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              export FORMAT_BASE_SHA="$(git rev-parse HEAD^)"
            else
              export FORMAT_BASE_SHA="$(git merge-base origin/main HEAD)"
            fi
            export FORMAT_BRANCH="$CIRCLE_BRANCH"
            bun run format:check

      - run:
          name: Run unit tests
          command: bun run test

      - run:
          name: Smoke Electron native image decoding
          command: bun run test:image

      - run:
          name: Build renderer
          command: bun run build

      - run:
          name: Capture production-window visual evidence
          command: |
            evidence_root="$CIRCLE_WORKING_DIRECTORY/.ci-artifacts"
            mkdir -p "$evidence_root"
            export OKS_VISUAL_EVIDENCE_DIR="$evidence_root/video-style-visual"
            bun run test:visual

      - store_artifacts:
          path: .ci-artifacts/video-style-visual
          destination: video-style-visual-macOS

      - run:
          name: Capture style-session visual evidence
          command: |
            evidence_root="$CIRCLE_WORKING_DIRECTORY/.ci-artifacts"
            mkdir -p "$evidence_root"
            export OKS_VISUAL_EVIDENCE_DIR="$evidence_root/style-session-visual"
            bun run test:visual -- --scenario=style-session

      - store_artifacts:
          path: .ci-artifacts/style-session-visual
          destination: style-session-visual-macOS

      - run:
          name: Package unpacked desktop app
          command: bunx electron-builder --dir --publish never

  Windows:
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.medium
    environment:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - checkout

      - run:
          name: Configure Node.js 24 and Bun 1.3.14
          command: |
            nvm install 24.0.2
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            nvm use 24.0.2
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            npm install --global bun@1.3.14
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if ((node --version) -ne "v24.0.2") { throw "Unexpected Node.js version" }
            if ((bun --version) -ne "1.3.14") { throw "Unexpected Bun version" }

      - run:
          name: Install locked dependencies
          command: |
            bun install --frozen-lockfile
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - run:
          name: Run unit tests except formatter integration
          command: |
            bun run test -- --exclude tests/format-diff.test.ts
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - run:
          name: Smoke Electron native image decoding
          command: |
            bun run test:image
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - run:
          name: Build renderer
          command: |
            bun run build
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - run:
          name: Capture production-window visual evidence
          command: |
            $evidenceRoot = Join-Path $env:CIRCLE_WORKING_DIRECTORY ".ci-artifacts"
            New-Item -ItemType Directory -Force -Path $evidenceRoot | Out-Null
            $env:OKS_VISUAL_EVIDENCE_DIR = Join-Path $evidenceRoot "video-style-visual"
            bun run test:visual
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - store_artifacts:
          path: .ci-artifacts/video-style-visual
          destination: video-style-visual-Windows

      - run:
          name: Capture style-session visual evidence
          command: |
            $evidenceRoot = Join-Path $env:CIRCLE_WORKING_DIRECTORY ".ci-artifacts"
            New-Item -ItemType Directory -Force -Path $evidenceRoot | Out-Null
            $env:OKS_VISUAL_EVIDENCE_DIR = Join-Path $evidenceRoot "style-session-visual"
            bun run test:visual -- --scenario=style-session
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - store_artifacts:
          path: .ci-artifacts/style-session-visual
          destination: style-session-visual-Windows

      - run:
          name: Package unpacked desktop app
          command: |
            bunx electron-builder --dir --publish never
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

workflows:
  ci:
    when: >-
      (pipeline.event.name == "push" and pipeline.git.branch == "main") or
      (pipeline.event.name == "pull_request" and
      pipeline.event.github.pull_request.base.ref == "main")
    jobs:
      - macOS
      - Windows
